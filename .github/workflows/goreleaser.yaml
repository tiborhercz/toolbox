name: GoReleaser

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-vue:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ '24' ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Installing Vite
        working-directory: ./static/UI
        run: npm install -g vite

      - name: Installing node project dependencies
        working-directory: ./static/UI
        run: npm install

      - name: Building the project
        working-directory: ./static/UI
        run: npm run build

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v7
        with:
          name: vue-frontend
          path: |
            static/UI/dist/
            !static/UI/node_modules/

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
      - name: Build wasm
        run: GOOS=js GOARCH=wasm go build -o main.wasm wasm/*.go
      - uses: actions/upload-artifact@v7
        with:
          name: go-wasm
          path: main.wasm

  goreleaser:
    needs: ['build-vue', 'build-wasm']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - uses: actions/download-artifact@v7
        with:
          name: vue-frontend
          path: static/UI/dist

      - uses: actions/download-artifact@v7
        with:
          name: go-wasm
          path: static/UI/dist

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --skip=validate --clean
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
